<title>NEO LABS — Agent Profile</title>
<style>
  :root {
    --bg: #0a0a0f;
    --bg-2: #141420;
    --fg: #e8e8e8;
    --muted: #8a8a98;
    --muted-2: #6b6b76;
    --border: rgba(255,255,255,0.08);
    --card: rgba(255,255,255,0.03);
    --px: 8px;

    --neo: #ff6b35;
    --atlas: #14b8a6;
    --nova: #a855f7;
    --luna: #ec4899;
    --pixel: #22c55e;
    --sage: #eab308;
    --rex: #ef4444;
    --byte: #3b82f6;
    --quill: #e5e5e5;
    --zara: #d946ef;
    --ghost: #64748b;
    --forge: #0ea5e9;
  }
  html[data-theme="light"] {
    --bg: #fafafa; --bg-2: #ffffff; --fg: #1a1a22;
    --muted: #666672; --muted-2: #8a8a94;
    --border: rgba(0,0,0,0.08); --card: rgba(0,0,0,0.02);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: 'Inter', 'Noto Sans Thai', system-ui, sans-serif;
    min-height: 100vh;
    padding: 24px 20px 80px;
  }

  /* ============ TOPBAR ============ */
  .topbar {
    max-width: 980px; margin: 0 auto 24px;
    display: flex; align-items: center; gap: 10px;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 8px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--fg); text-decoration: none; font-size: 13px;
    transition: background .15s, border-color .15s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); }
  html[data-theme="light"] .back-btn:hover { background: rgba(0,0,0,0.04); }
  .spacer { flex: 1; }
  .brand-mini {
    font-weight: 800; letter-spacing: 2px; font-size: 13px;
    color: var(--muted);
  }

  /* ============ HEADER ============ */
  .hero {
    max-width: 980px; margin: 0 auto 32px;
    display: grid; grid-template-columns: auto 1fr; gap: 32px;
    align-items: center;
    padding: 32px 28px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 20% 30%, var(--accent, var(--neo)) 0%, transparent 40%);
    opacity: 0.12; pointer-events: none;
  }
  .stage {
    width: 120px; height: 120px;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
  }
  .hero-meta { position: relative; z-index: 1; }
  .hero-role {
    display: inline-block;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 99px;
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    color: var(--accent);
    margin-bottom: 10px;
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
  }
  .hero-name {
    font-size: 48px; font-weight: 900; letter-spacing: 3px;
    color: var(--accent); line-height: 1;
    margin-bottom: 10px;
    text-shadow: 0 0 40px color-mix(in srgb, var(--accent) 40%, transparent);
  }
  .hero-tagline { color: var(--muted); font-size: 15px; line-height: 1.5; max-width: 600px; }

  @media (max-width: 640px) {
    .hero { grid-template-columns: 1fr; padding: 24px 20px; text-align: center; }
    .stage { justify-self: center; }
    .hero-name { font-size: 36px; }
  }

  /* ============ SECTIONS ============ */
  .wrap { max-width: 980px; margin: 0 auto; display: grid; gap: 16px; }
  .sec {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px 24px;
  }
  .sec-title {
    font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--muted-2); margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .sec-title::before {
    content: ''; width: 4px; height: 14px; border-radius: 2px;
    background: var(--accent);
  }
  .desc { font-size: 15px; line-height: 1.7; color: var(--fg); }
  .desc p + p { margin-top: 10px; }

  .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .pill {
    padding: 6px 12px; border-radius: 99px;
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
    font-size: 12px; font-weight: 600;
  }

  ul.cap { list-style: none; display: grid; gap: 8px; }
  ul.cap li {
    padding: 10px 14px;
    background: rgba(255,255,255,0.02);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 14px; line-height: 1.5;
  }
  html[data-theme="light"] ul.cap li { background: rgba(0,0,0,0.03); }

  /* ============ PLATFORM FEATURES ============ */
  .pf-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 10px;
  }
  .pf-item {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px 14px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: background .15s, border-color .15s;
  }
  html[data-theme="light"] .pf-item { background: rgba(0,0,0,0.02); }
  .pf-item:hover { background: rgba(255,255,255,0.04); border-color: color-mix(in srgb, var(--accent) 30%, var(--border)); }
  html[data-theme="light"] .pf-item:hover { background: rgba(0,0,0,0.04); }
  .pf-icon { font-size: 18px; flex-shrink: 0; padding-top: 2px; line-height: 1; }
  .pf-body { flex: 1; min-width: 0; }
  .pf-name { font-size: 13px; font-weight: 600; color: var(--fg); margin-bottom: 4px; }
  .pf-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  ul.cap li b { color: var(--accent); font-weight: 600; }

  .prompt-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
  .prompt-card {
    padding: 14px 16px;
    background: rgba(255,255,255,0.02);
    border: 1px dashed var(--border);
    border-radius: 10px;
    font-size: 14px; color: var(--fg);
    cursor: pointer; transition: background .15s, border-color .15s;
    position: relative;
  }
  .prompt-card:hover { background: color-mix(in srgb, var(--accent) 8%, transparent); border-color: var(--accent); border-style: solid; }
  .prompt-card::before {
    content: '→'; position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%); opacity: 0; transition: opacity .15s, transform .15s;
    color: var(--accent);
  }
  .prompt-card:hover::before { opacity: 1; transform: translateY(-50%) translateX(3px); }
  html[data-theme="light"] .prompt-card { background: rgba(0,0,0,0.02); }

  .cta-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 22px; border-radius: 10px;
    font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
    cursor: pointer; text-decoration: none;
    border: 1px solid transparent;
    transition: transform .12s, background .15s, box-shadow .15s;
  }
  .btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 14px -4px color-mix(in srgb, var(--accent) 60%, transparent);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px -4px color-mix(in srgb, var(--accent) 70%, transparent); }
  .btn-ghost {
    background: transparent; color: var(--fg);
    border-color: var(--border);
  }
  .btn-ghost:hover { background: var(--card); border-color: rgba(255,255,255,0.2); }
  html[data-theme="light"] .btn-ghost:hover { background: rgba(0,0,0,0.04); }

  /* ============ OTHER-AGENTS STRIP ============ */
  .others {
    max-width: 980px; margin: 40px auto 0;
  }
  .others-title {
    font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--muted-2); margin-bottom: 14px;
  }
  .others-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .other-card {
    padding: 14px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
    text-align: center; text-decoration: none; color: inherit;
    transition: transform .15s, border-color .15s;
  }
  .other-card:hover { transform: translateY(-2px); border-color: var(--oc, #555); }
  .other-dot {
    width: 10px; height: 10px; border-radius: 50%;
    display: inline-block; margin-right: 6px;
    background: var(--oc); box-shadow: 0 0 8px var(--oc);
  }
  .other-name { font-weight: 700; font-size: 13px; letter-spacing: 1px; color: var(--oc); }
  .other-role { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ============ PIXEL BOT (reused from team.html) ============ */
  .bot {
    display: grid;
    grid-template-columns: repeat(10, var(--px));
    grid-template-rows: repeat(10, var(--px));
    filter: drop-shadow(0 0 20px currentColor);
    animation: idle 2.4s ease-in-out infinite;
  }
  .bot .p { width: var(--px); height: var(--px); background: currentColor; }
  .bot .eye { background: #fff; animation: blink 4s infinite; transform-origin: center; }
  .bot .mouth { background: #fff; }
  @keyframes idle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  @keyframes blink { 0%,90%,100%{transform:scaleY(1)} 93%,97%{transform:scaleY(0.1)} }

  /* ============ NOT FOUND ============ */
  .notfound {
    max-width: 500px; margin: 80px auto; text-align: center;
    padding: 40px;
  }
  .notfound h2 { font-size: 22px; margin-bottom: 10px; }
  .notfound p { color: var(--muted); margin-bottom: 24px; }
</style>

  quill: { eye:[{r:4,c:3},{r:5,c:3},{r:5,c:7},{r:5,c:8},{r:5,c:9}],
           mouth:[{r:7,c:4},{r:7,c:5},{r:7,c:6},{r:6,c:7}] },
  zara:  { eye:[{r:4,c:2},{r:4,c:3},{r:5,c:3},{r:4,c:8},{r:4,c:9},{r:5,c:8}],
           mouth:[{r:7,c:3},{r:7,c:4},{r:7,c:5},{r:7,c:6},{r:7,c:7},{r:7,c:8}] },
  ghost: { eye:[{r:4,c:3},{r:4,c:8}],
           mouth:[{r:7,c:5},{r:7,c:6}] },
  forge: { eye:[{r:4,c:2},{r:4,c:3},{r:5,c:2},{r:5,c:3},{r:4,c:8},{r:4,c:9},{r:5,c:8},{r:5,c:9}],
           mouth:[{r:7,c:3},{r:7,c:4},{r:7,c:5},{r:7,c:6},{r:7,c:7},{r:7,c:8}] }
};

function buildBot(id, color) {
  const bot = document.createElement('div');
  bot.className = 'bot';
  bot.style.color = color;
  const add = (r, c, extra) => {
    const d = document.createElement('div');
    d.className = 'p' + (extra ? ' ' + extra : '');
    d.style.gridRow = r; d.style.gridColumn = c;
    bot.appendChild(d);
  };
  BODY.forEach(p => add(p.r, p.c));
  const face = FACES[id] || FACES.neo;
  const es = new Set(face.eye.map(p => `${p.r},${p.c}`));
  const ms = new Set(face.mouth.map(p => `${p.r},${p.c}`));
  FACE_CELLS.forEach(({r,c}) => {
    const k = `${r},${c}`;
    if (es.has(k)) add(r,c,'eye');
    else if (ms.has(k)) add(r,c,'mouth');
    else add(r,c);
  });
  return bot;
}

/* ============================================================
   RENDER
   ============================================================ */
function render() {
  const id = (new URLSearchParams(location.search).get('id') || 'neo').toLowerCase();
  const a = AGENTS[id];
  const root = document.getElementById('root');

  if (!a) {
    root.innerHTML = `
      <div class="notfound">
        <h2>Agent not found</h2>
        <p>ไม่รู้จัก agent "${id}" — ลองเลือกจากทีมทั้งหมด</p>
        <a class="btn btn-primary" href="neo-labs-team.html">← ดูทีมทั้งหมด</a>
      </div>`;
    return;
  }

  document.title = `${a.name} — ${a.role} | NEO LABS`;
  root.style.setProperty('--accent', a.color);

  const caps = a.capabilities.map(c => `<li>${c}</li>`).join('');
  const platform = PLATFORM_FEATURES.map(f => `
    <div class="pf-item">
      <span class="pf-icon">${f.icon}</span>
      <div class="pf-body">
        <div class="pf-name">${f.name}</div>
        <div class="pf-desc">${f.desc}</div>
      </div>
    </div>
  `).join('');
  const prompts = a.examplePrompts.map(p => {
    const encoded = encodeURIComponent(p);
    return `<a class="prompt-card" href="neo-labs-office.html?prompt=${encoded}&agent=${id}">${p}</a>`;
  }).join('');

  const others = Object.entries(AGENTS)
    .filter(([oid]) => oid !== id)
    .map(([oid, oa]) => `
      <a class="other-card" href="neo-labs-agent.html?id=${oid}" style="--oc: ${oa.color}">
        <div><span class="other-dot"></span><span class="other-name">${oa.name}</span></div>
        <div class="other-role">${oa.role}</div>
      </a>`).join('');

  root.innerHTML = `
    <header class="hero" style="--accent: ${a.color}">
      <div class="stage"><div id="botStage"></div></div>
      <div class="hero-meta">
        <span class="hero-role">${a.role}</span>
        <div class="hero-name">${a.name}</div>
        <div class="hero-tagline">${a.tagline}</div>
        <div class="cta-row">
          <a class="btn btn-primary" href="neo-labs-office.html?agent=${id}">💬 คุยกับ ${a.name}</a>
          ${a.command && a.command !== '(default)' ? `<span class="btn btn-ghost" style="cursor:default">${a.command}</span>` : ''}
        </div>
      </div>
    </header>

    <div class="wrap" style="--accent: ${a.color}">
      <section class="sec">
        <div class="sec-title">เกี่ยวกับ ${a.name}</div>
        <div class="desc">${a.description.map(p => `<p>${p}</p>`).join('')}</div>
      </section>

      <section class="sec">
        <div class="sec-title">ความสามารถเฉพาะทาง</div>
        <ul class="cap">${caps}</ul>
      </section>

      <section class="sec">
        <div class="sec-title">Platform features (ใช้ได้ในทุก chat)</div>
        <div class="pf-grid">${platform}</div>
      </section>

      <section class="sec">
        <div class="sec-title">ตัวอย่างคำสั่ง (คลิกเพื่อเปิดใน Office)</div>
        <div class="prompt-grid">${prompts}</div>
      </section>

      <section class="sec">
        <div class="sec-title">คุยต่อกับใคร / Handoff</div>
        <div class="desc"><p>${a.handoffs}</p></div>
      </section>
    </div>

    <div class="others">
      <div class="others-title">Specialist คนอื่น</div>
      <div class="others-grid">${others}</div>
    </div>
  `;

  // Mount pixel bot into stage
  const stage = document.getElementById('botStage');
  stage.appendChild(buildBot(id, a.color));
}

render();
window.addEventListener('popstate', render);
</script>
